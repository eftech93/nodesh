version: '3.8'

services:
  # MongoDB - Document Database
  mongo:
    image: mongo:7
    container_name: nodesh-nextjs-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: nodesh_example
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - In-Memory Cache
  redis:
    image: redis:7-alpine
    container_name: nodesh-nextjs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: nodesh-nextjs-redis-commander
    ports:
      - "8081:8081"
    environment:
      REDIS_HOSTS: local:redis:6379
    depends_on:
      - redis

  # PostgreSQL - Relational Database
  postgres:
    image: postgres:16-alpine
    container_name: nodesh-nextjs-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nodesh_example
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - PostgreSQL Admin UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: nodesh-nextjs-pgadmin
    ports:
      - "8082:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@nodesh.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres

  # MySQL - Relational Database
  mysql:
    image: mysql:8.0
    container_name: nodesh-nextjs-mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: mysql
      MYSQL_DATABASE: nodesh_example
      MYSQL_USER: nodesh
      MYSQL_PASSWORD: nodesh
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: --default-authentication-plugin=mysql_native_password

  # phpMyAdmin - MySQL Admin UI
  phpmyadmin:
    image: phpmyadmin/phpmyadmin:latest
    container_name: nodesh-nextjs-phpmyadmin
    ports:
      - "8083:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: mysql
    depends_on:
      - mysql

  # Neo4j - Graph Database
  neo4j:
    image: neo4j:5-community
    container_name: nodesh-nextjs-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      NEO4J_AUTH: neo4j/password
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*,graph-data-science.*"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "password", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # DynamoDB Local - AWS DynamoDB Emulator
  dynamodb:
    image: amazon/dynamodb-local:latest
    container_name: nodesh-nextjs-dynamodb
    ports:
      - "8000:8000"
    # Use in-memory storage to avoid SQLite permission issues
    command: "-jar DynamoDBLocal.jar -sharedDb -inMemory"
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:8000/shell/ | grep -q '200\\|400' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # DynamoDB Admin UI
  dynamodb-admin:
    image: aaronshaf/dynamodb-admin:latest
    container_name: nodesh-nextjs-dynamodb-admin
    ports:
      - "8084:8001"
    environment:
      DYNAMO_ENDPOINT: http://dynamodb:8000
      AWS_REGION: us-east-1
      AWS_ACCESS_KEY_ID: local
      AWS_SECRET_ACCESS_KEY: local
    depends_on:
      - dynamodb

volumes:
  mongo_data:
  redis_data:
  postgres_data:
  pgadmin_data:
  mysql_data:
  neo4j_data:
  neo4j_logs:
  dynamodb_data:
